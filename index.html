<!DOCTYPE html>
<html lang="id">
<head>

    <title>Open Palm Blur</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Kamera -->
    <video
        id="webcam"
        autoplay
        playsinline
        muted>
    </video>

    <!-- Canvas -->
    <canvas id="canvas"></canvas>

    <!-- Blur Overlay -->
    <div id="blurLayer"></div>

    <!-- Status -->
    <div id="statusBox">
        <h2>🖐 Open Palm Detector</h2>
        <p id="status">
            Menunggu gesture...
        </p>
    </div>

    <!-- Script -->
    <script type="module" src="script.js"></script>

</body>
</html>
